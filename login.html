<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client's Art Corner - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-section">
                <img id="logo-01" src="./Website Files/Website Files/Art Files/Album/logo.png" alt="logo">
                <h1>Client's Art Corner</h1>
            </div>
            <nav>
                <a href="index.html">Home</a>
                <a href="prints.html">Prints</a>
                <a href="about-me.html">About Me</a>
                <a href="Ongoing-Projects.html">Projects</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="user-section">
                <a href="login.html" class="auth-btn">Login</a>
            </div>
        </div>
    </header>

    <main class="login-page">
        <section class="container">
            <h2>Entrar</h2>
            <p class="login-subtitle">Acesse sua conta para gerenciar seu cantinho de arte.</p>

            <form id="form_login" class="login-form">
                <div class="form-group">
                    <label for="user">Nome de usuário</label>
                    <input type="text" id="user" name="user" placeholder="Digite seu usuário" required>
                </div>

                <div class="form-group">
                    <label for="email-login">Email</label>
                    <input type="email" id="email-login" name="email-login" placeholder="Digite seu email" required>
                </div>

                <div class="form-group">
                    <label for="senha-login">Senha</label>
                    <input type="password" id="senha-login" name="senha-login" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="submit-btn">Entrar</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
