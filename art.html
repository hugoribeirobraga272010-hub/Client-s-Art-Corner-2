<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art - Client's Art Corner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-section">
                <img id="logo-01" src="./Website Files/Website Files/Art Files/Album/logo.png" alt="logo">
                <h1>Client's Art Corner</h1>
            </div>
            <nav>
                <a href="index.html">Home</a>
                <a href="prints.html">Prints</a>
                <a href="about-me.html">About Me</a>
                <a href="Ongoing-Projects.html">Projects</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="user-section">
                <a href="my-corner.html" class="auth-btn">Login</a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="art-detail" id="artDetail">
                <!-- Art content will be loaded here -->
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Client's Art Corner. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
    <script>
        let selectedSize = 'A4';
        let currentArt = null;

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function selectSize(size) {
            selectedSize = size;
            
            // Update visual selection
            document.querySelectorAll('.size-option').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
            
            // Update price
            const price = getSizePrice(size);
            document.getElementById('priceDisplay').textContent = formatPrice(price);
        }

        function handleBuy() {
            if (!isLoggedIn()) {
                if (confirm('You need to be logged in to make a purchase. Do you want to login?')) {
                    window.location.href = 'my-corner.html';
                }
                return;
            }

            const result = addToCart(currentArt.id, selectedSize);
            
            if (result.success) {
                alert(result.message);
                window.location.href = 'prints.html';
            } else {
                alert(result.message);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const artId = getQueryParam('id');
            
            if (!artId) {
                document.getElementById('artDetail').innerHTML = '<p>Art not found.</p>';
                return;
            }

            currentArt = getArtById(artId);
            
            if (!currentArt) {
                document.getElementById('artDetail').innerHTML = '<p>Art not found.</p>';
                return;
            }

            const defaultPrice = getSizePrice('A4');

            document.getElementById('artDetail').innerHTML = `
                <div class="art-image">
                    <img src="${currentArt.image}" alt="${currentArt.name}">
                </div>
                <div class="art-info">
                    <h1 class="art-title">${currentArt.name}</h1>
                    <p class="art-category">${currentArt.category}</p>
                    <p class="art-description">${currentArt.description}</p>
                    
                    <div class="size-selector">
                        <p class="size-title">Select Print Size:</p>
                        <div class="size-options">
                            <button class="size-option" onclick="selectSize('A2')">A2<br><small>16.5" Ã— 23.4"</small></button>
                            <button class="size-option" onclick="selectSize('A3')">A3<br><small>11.7" Ã— 16.5"</small></button>
                            <button class="size-option selected" onclick="selectSize('A4')">A4<br><small>8.3" Ã— 11.7"</small></button>
                            <button class="size-option" onclick="selectSize('A5')">A5<br><small>5.8" Ã— 8.3"</small></button>
                        </div>
                    </div>
                    
                    <div class="price-display" id="priceDisplay">${formatPrice(defaultPrice)}</div>
                    
                    <button class="buy-btn" onclick="handleBuy()">Buy!</button>
                </div>
            `;
        });
    </script>
</body>
</html>
